###############################################################################
#  PatchMaster Frontend — Production Nginx Config
#  Supports both HTTP (port 80) and HTTPS (port 443) when SSL certs are
#  mounted at /etc/nginx/ssl/. If no certs are present, only HTTP is served.
###############################################################################

# Security headers
map $sent_http_content_type $csp_header {
    default "";
    "text/html" "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'";
}

# ── HTTP → HTTPS redirect (only when SSL is enabled) ──
# To enable: mount certs and set SSL_ENABLED=true in .env
# When SSL is off this block is harmless (443 not bound).
server {
    listen 80;
    server_name _;

    # Check if SSL cert exists — if yes, redirect to HTTPS
    set $do_redirect 0;
    if (-f /etc/nginx/ssl/fullchain.pem) {
        set $do_redirect 1;
    }
    if ($do_redirect = 1) {
        return 301 https://$host$request_uri;
    }

    # If no SSL, serve normally (fallback — included below via include)
    include /etc/nginx/conf.d/locations.inc*;
}

# ── HTTPS server (active only when certs are mounted) ──
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (uncomment after confirming SSL works)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    include /etc/nginx/conf.d/locations.inc*;
}

