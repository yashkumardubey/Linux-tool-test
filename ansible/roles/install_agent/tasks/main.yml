---
- name: Ensure patchagent user exists
  user:
    name: patchagent
    system: yes
    create_home: no

- name: Create application directories
  file:
    path: /opt/patch-agent
    state: directory
    owner: patchagent
    group: patchagent
    mode: '0755'

- name: Copy agent files (control host must have repo checkout)
  copy:
    src: ../../../agent/
    dest: /opt/patch-agent/
    owner: patchagent
    group: patchagent
    mode: '0755'

- name: Create certs dir
  file:
    path: /etc/patch-agent/certs
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Ensure log directory
  file:
    path: /var/log/patch-agent
    state: directory
    owner: patchagent
    group: patchagent
    mode: '0750'

- name: Install python deps
  become: true
  pip:
    requirements: /opt/patch-agent/agent/requirements.txt

- name: Install systemd unit
  copy:
    src: ../../../systemd/patch-agent.service
    dest: /etc/systemd/system/patch-agent.service
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and start patch agent
  systemd:
    name: patch-agent.service
    enabled: yes
    state: started
