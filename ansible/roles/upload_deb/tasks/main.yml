---
- name: Ensure upload directory exists on target
  file:
    path: /tmp/patch_agent_debs
    state: directory
    mode: '0755'

- name: Copy local .deb files to target (set `debs_src` to path on control)
  copy:
    src: "{{ item }}"
    dest: /tmp/patch_agent_debs/
  with_fileglob:
    - "{{ debs_src | default('files') }}/*.deb"
  when: debs_src is defined

- name: Trigger agent to install uploaded packages
  uri:
    url: "http://{{ inventory_hostname }}:8080/install_uploaded"
    method: POST
    return_content: yes
    status_code: 200
  register: install_result

- name: Show install result
  debug:
    var: install_result.json
