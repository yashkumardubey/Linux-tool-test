---
- name: Offline patch run (Ubuntu)
  hosts: all
  become: true
  vars:
    internal_mirror: "http://internal-mirror.example.local/ubuntu"
    snapshot_command: "echo 'snapshot placeholder'"
  tasks:
    - name: Pre-check - ensure agent reachable
      uri:
        url: "http://{{ inventory_hostname }}:8080/health"
        method: GET
        return_content: no
      register: agent_health
      failed_when: agent_health.status not in [200]

    - name: Create snapshot (placeholder)
      ansible.builtin.shell: "{{ snapshot_command }}"
      register: snapshot_res

    - name: Configure local apt mirror list
      copy:
        dest: /etc/apt/sources.list.d/internal-mirror.list
        content: |
          deb {{ internal_mirror }} focal main restricted universe multiverse
      notify: update apt cache

    - name: Query available updates from agent
      uri:
        url: "http://{{ inventory_hostname }}:8080/updates"
        method: GET
        return_content: yes
      register: updates

    - name: Show available updates (debug)
      debug:
        var: updates.json.upgradable

    - name: Run selected packages or full upgrade via agent API
      uri:
        url: "http://{{ inventory_hostname }}:8080/install_selected"
        method: POST
        body_format: json
        body: >-
          {
            "packages": {{ selected_packages | default([]) | to_json }},
            "hold": {{ (db_exclude_packages if (group_names is defined and 'db' in group_names) else []) | to_json }}
          }
        status_code: 200
      register: patch_job_start

  handlers:
    - name: update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
