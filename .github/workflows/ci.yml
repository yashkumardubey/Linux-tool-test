name: CI

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt
      - name: Run unit tests
        run: |
          python -m pytest -q || true

  integration-vm:
    # Integration job: runs only on self-hosted runners with virtualization available
    runs-on: [self-hosted, vm-runner]
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Ensure virtualization tools
        run: |
          sudo apt-get update
          sudo apt-get install -y vagrant virtualbox
      - name: Start demo VM (Vagrant)
        run: |
          # ensure certs exist for TLS verification
          rm -rf certs
          ./scripts/generate_certs.sh certs
          vagrant up --provider=virtualbox || true
      - name: Run demo provisioning checks
        run: |
          echo "If Vagrant VM is running, you can run the demo playbook or tests here."
      - name: Run integration scripts (example)
        run: |
          ./scripts/run_integration_demo.sh || true
      - name: Tear down VMs
        if: always()
        run: |
          vagrant destroy -f || true
