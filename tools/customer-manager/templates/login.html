<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — PatchMaster Customer Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
    .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px;
                  padding: 2.5rem; width: 100%; max-width: 420px; }
    .login-card h3 { font-weight: 700; color: #fff; }
    .form-control { background: #0f172a; border-color: #334155; color: #e2e8f0; }
    .form-control:focus { background: #0f172a; border-color: #3b82f6; color: #e2e8f0;
                          box-shadow: 0 0 0 0.2rem rgba(59,130,246,0.25); }
    .btn-primary { background: #3b82f6; border-color: #3b82f6; }
    .btn-primary:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-primary" style="font-size:2.5rem"></i>
      <h3 class="mt-2">PatchMaster</h3>
      <p class="text-muted mb-0">Customer Manager</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 px-3" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label text-muted small">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label text-muted small">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>
  </div>
</body>
</html>
